name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info

jobs:
  build:
    name: Build Test Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: crates/deploy/tests/kona/target
      - uses: taiki-e/install-action@nextest

      - name: Build kona-node binary
        run: cargo build --release --bin kona-node
        working-directory: crates/deploy/tests/kona

      - name: Archive integration test binary
        run: cargo nextest archive --test integration_test --archive-file nextest-archive.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: kona-node-binary
          path: crates/deploy/tests/kona/target/release/kona-node
          retention-days: 1

  integration:
    name: Integration Tests (${{ matrix.partition }}/6)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: taiki-e/install-action@nextest

      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive

      - uses: actions/download-artifact@v4
        with:
          name: kona-node-binary
          path: kona-node-binary

      - name: Run integration tests (shard ${{ matrix.partition }}/6)
        env:
          KUPCAKE_TEST_TMPDIR: ${{ github.workspace }}
          KONA_NODE_BINARY: ${{ github.workspace }}/kona-node-binary/kona-node
        run: |
          cargo nextest run \
            --archive-file nextest-archive.tar.zst \
            --no-capture \
            --partition count:${{ matrix.partition }}/6
